<!DOCTYPE html>
<html class="dark" lang="es">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Dashboard - Asistente de Tareas</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#d4af37", // Muted Gold
                        "accent": "#6366f1",  // Indigo
                        "bg-dark": "#1a1c2e", // Deep Indigo/Slate
                        "card-dark": "#232642",
                        "surface": "#2d3154",
                        "gold": {
                            "DEFAULT": "#d4af37",
                            "light": "#f1e4b5",
                            "dark": "#997b24"
                        }
                    },
                    fontFamily: {
                        "sans": ["Inter", "sans-serif"]
                    },
                    borderRadius: { "DEFAULT": "0.375rem", "lg": "0.75rem", "xl": "1rem", "full": "9999px" },
                },
            },
        }
    </script>
    <style type="text/tailwindcss">
        :root {
            --primary: #d4af37;
            --accent: #6366f1;
            --bg-dark: #1a1c2e;
        }
        body { 
            font-family: 'Inter', sans-serif;
            background-color: #1a1c2e;
            letter-spacing: -0.011em;
        }
        .glass-effect {
            background: rgba(35, 38, 66, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(212, 175, 55, 0.1);
        }
        .executive-glow {
            box-shadow: 0 10px 30px -15px rgba(0, 0, 0, 0.5), 0 0 15px rgba(212, 175, 55, 0.05);
        }
    </style>
</head>

<body class="bg-bg-dark text-slate-300 min-h-screen flex flex-col">
    <header class="sticky top-0 z-50 bg-bg-dark/95 backdrop-blur-md border-b border-indigo-900/50 px-6 py-4">
        <div class="max-w-[1440px] mx-auto flex items-center justify-between gap-8">
            <div class="flex items-center gap-8 shrink-0">
                <div class="flex items-center gap-2 text-gold group cursor-pointer transition-all hover:opacity-80"
                    title="Asistente de Tareas">
                    <span class="material-symbols-outlined text-3xl font-bold">insights</span>
                    <h1 class="text-white text-xl font-extrabold tracking-tight select-none">Taskly
                        <span class="text-gold font-light tracking-widest text-[10px] uppercase ml-1">Dashboard</span>
                    </h1>
                </div>
            </div>

            <div class="flex items-center gap-4 shrink-0">
                <div class="text-right">
                    <p class="text-xs font-bold text-white leading-tight" id="userNameDisplay"></p>
                    <p class="text-[10px] text-gold/60 uppercase tracking-widest font-medium" id="userEmail"></p>
                </div>

                <button onclick="logout()" class="p-2 text-slate-400 hover:text-gold transition-colors"
                    title="Cerrar sesión">
                    <span class="material-symbols-outlined">logout</span>
                </button>
            </div>
        </div>
    </header>

    <main class="flex-1 max-w-[1440px] mx-auto w-full p-6">
        <div class="bg-card-dark rounded-xl border border-indigo-900/30 p-8 executive-glow">
            <h2 class="text-2xl font-bold text-white mb-6">Resumen del Dashboard</h2>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div class="bg-slate-900/30 p-5 rounded-xl border border-indigo-900/20">
                    <h3 class="text-lg font-bold text-white mb-2">Tareas Pendientes</h3>
                    <p class="text-3xl font-extrabold text-gold" id="tareasPendientes">0</p>
                </div>
                <div class="bg-slate-900/30 p-5 rounded-xl border border-indigo-900/20">
                    <h3 class="text-lg font-bold text-white mb-2">Tareas Completadas</h3>
                    <p class="text-3xl font-extrabold text-gold" id="tareasCompletadas">0</p>
                </div>
                <div class="bg-slate-900/30 p-5 rounded-xl border border-indigo-900/20">
                    <h3 class="text-lg font-bold text-white mb-2">Productividad</h3>
                    <p class="text-3xl font-extrabold text-gold" id="productividad">0%</p>
                </div>
            </div>
            
            <div class="mt-8">
                <h3 class="text-lg font-bold text-white mb-4">Últimas Tareas</h3>
                <div id="ultimasTareas" class="space-y-3">
                    <!-- Las tareas se cargarán dinámicamente -->
                </div>
            </div>
        </div>
    </main>

    <script type="module">
        import { api } from './js/api.js?v=1.3';
        
        // Verificar si hay token
        if (!localStorage.getItem('taskly_token')) {
            window.location.href = 'auth.html';
        }

        window.logout = function () {
            localStorage.removeItem('taskly_token');
            localStorage.removeItem('taskly_user');
            window.location.href = 'auth.html';
        }

        // Inicializar nombre de usuario en el header
        const userData = localStorage.getItem('taskly_user');
        if (userData) {
            try {
                const user = JSON.parse(userData);
                if (user.email) {
                    document.getElementById('userEmail').textContent = user.email;
                }
            } catch (e) {
                console.error('Error parsing user data:', e);
            }
        }

        // Cargar datos del dashboard
        async function cargarDatosDashboard() {
            try {
                const tareas = await api.getTareas();
                
                // Contar tareas
                const completadas = tareas.filter(t => t.completada).length;
                const pendientes = tareas.length - completadas;
                const productividad = tareas.length > 0 ? Math.round((completadas / tareas.length) * 100) : 0;
                
                // Actualizar contadores
                document.getElementById('tareasPendientes').textContent = pendientes;
                document.getElementById('tareasCompletadas').textContent = completadas;
                document.getElementById('productividad').textContent = `${productividad}%`;
                
                // Mostrar últimas tareas
                const ultimasTareasDiv = document.getElementById('ultimasTareas');
                ultimasTareasDiv.innerHTML = tareas.slice(0, 5).map(tarea => `
                    <div class="p-3 bg-slate-900/20 rounded-lg border border-indigo-900/20">
                        <div class="flex justify-between items-center">
                            <span class="${tarea.completada ? 'line-through text-slate-500' : 'text-white'}">${tarea.descripcion}</span>
                            <span class="text-xs px-2 py-1 rounded ${tarea.prioridad === 'ALTA' ? 'bg-red-500/20 text-red-400' : tarea.prioridad === 'MEDIA' ? 'bg-gold/20 text-gold' : 'bg-accent/20 text-accent'}">
                                ${tarea.prioridad}
                            </span>
                        </div>
                    </div>
                `).join('');
                
            } catch (error) {
                console.error('Error al cargar datos del dashboard:', error);
                if (error.message.includes('Sesión expirada')) {
                    return; // El API ya mandó a redirigir
                }
            }
        }

        // Cargar datos cuando se cargue la página
        document.addEventListener('DOMContentLoaded', cargarDatosDashboard);
    </script>
</body>

</html>
